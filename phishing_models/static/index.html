<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PhishShield — Threat Detection System</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
<style>
  /* ── Reset & Variables ─────────────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #080b12;
    --panel:     #0d1120;
    --border:    #1e2a42;
    --accent:    #00e5ff;
    --accent2:   #7b61ff;
    --safe:      #00c853;
    --low:       #4caf50;
    --medium:    #ffd600;
    --high:      #ff7a00;
    --critical:  #ff2d2d;
    --text:      #c8d6f0;
    --muted:     #4a5a7a;
    --mono:      'Share Tech Mono', monospace;
    --sans:      'Syne', sans-serif;
    --glow:      0 0 24px rgba(0,229,255,.18);
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Grid background ───────────────────────────────────────────────────── */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background-image:
      linear-gradient(rgba(0,229,255,.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  /* ── Header ────────────────────────────────────────────────────────────── */
  header {
    position: relative; z-index: 10;
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 40px;
    border-bottom: 1px solid var(--border);
    background: rgba(8,11,18,.85);
    backdrop-filter: blur(12px);
  }

  .logo {
    display: flex; align-items: center; gap: 12px;
  }
  .logo-icon {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    animation: pulse-hex 3s ease-in-out infinite;
  }
  @keyframes pulse-hex {
    0%,100% { filter: drop-shadow(0 0 6px var(--accent)); }
    50%      { filter: drop-shadow(0 0 18px var(--accent)); }
  }
  .logo-text { font-size: 1.3rem; font-weight: 800; letter-spacing: .08em; }
  .logo-text span { color: var(--accent); }

  .status-pill {
    display: flex; align-items: center; gap: 8px;
    font-family: var(--mono); font-size: .72rem;
    color: var(--muted); padding: 6px 14px;
    border: 1px solid var(--border); border-radius: 40px;
  }
  .status-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--muted);
    transition: background .3s;
  }
  .status-dot.online { background: var(--safe); box-shadow: 0 0 8px var(--safe); }

  /* ── Main layout ────────────────────────────────────────────────────────── */
  .container {
    position: relative; z-index: 1;
    max-width: 1100px; margin: 0 auto;
    padding: 48px 24px 80px;
  }

  .hero {
    text-align: center; margin-bottom: 52px;
  }
  .hero h1 {
    font-size: clamp(2rem, 5vw, 3.2rem);
    font-weight: 800; letter-spacing: -.01em;
    line-height: 1.1;
    background: linear-gradient(120deg, #fff 30%, var(--accent) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 14px;
  }
  .hero p {
    font-size: 1rem; color: var(--muted); max-width: 560px; margin: 0 auto;
    line-height: 1.6;
  }

  /* ── Tabs ───────────────────────────────────────────────────────────────── */
  .tabs {
    display: flex; gap: 4px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 5px;
    margin-bottom: 32px;
    width: fit-content;
  }
  .tab-btn {
    font-family: var(--sans); font-size: .88rem; font-weight: 600;
    letter-spacing: .04em;
    padding: 10px 28px; border-radius: 8px;
    border: none; cursor: pointer;
    background: transparent; color: var(--muted);
    transition: all .2s;
  }
  .tab-btn.active {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #000;
  }
  .tab-btn:not(.active):hover { color: var(--text); background: var(--border); }

  /* ── Panels ─────────────────────────────────────────────────────────────── */
  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px;
  }

  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* ── Form elements ──────────────────────────────────────────────────────── */
  label {
    display: block; font-size: .78rem; font-weight: 700;
    letter-spacing: .1em; color: var(--muted); text-transform: uppercase;
    margin-bottom: 8px;
  }

  input[type="text"], input[type="url"], textarea {
    width: 100%;
    background: rgba(255,255,255,.04);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 18px;
    color: var(--text);
    font-family: var(--mono); font-size: .9rem;
    outline: none;
    transition: border-color .2s, box-shadow .2s;
    resize: vertical;
  }
  input[type="text"]:focus,
  input[type="url"]:focus,
  textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(0,229,255,.1);
  }

  .form-row { margin-bottom: 20px; }

  .file-drop {
    border: 2px dashed var(--border);
    border-radius: 10px;
    padding: 24px;
    text-align: center;
    cursor: pointer;
    transition: border-color .2s, background .2s;
    font-size: .85rem; color: var(--muted);
  }
  .file-drop:hover { border-color: var(--accent); background: rgba(0,229,255,.03); }
  .file-drop input { display: none; }
  .file-list { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 8px; }
  .file-chip {
    font-family: var(--mono); font-size: .72rem;
    background: var(--border); border-radius: 20px;
    padding: 4px 12px; color: var(--text);
    display: flex; align-items: center; gap: 6px;
  }
  .file-chip button {
    background: none; border: none; color: var(--muted);
    cursor: pointer; font-size: 1rem; line-height: 1;
  }

  /* ── Submit button ──────────────────────────────────────────────────────── */
  .btn-scan {
    font-family: var(--sans); font-size: .95rem; font-weight: 700;
    letter-spacing: .06em; text-transform: uppercase;
    padding: 15px 40px; border-radius: 10px; border: none;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
    color: #000; cursor: pointer; width: 100%;
    transition: opacity .2s, transform .1s;
    position: relative; overflow: hidden;
  }
  .btn-scan:hover { opacity: .9; }
  .btn-scan:active { transform: scale(.99); }
  .btn-scan:disabled { opacity: .4; cursor: not-allowed; }
  .btn-scan .spinner {
    display: none; width: 18px; height: 18px;
    border: 2px solid rgba(0,0,0,.3);
    border-top-color: #000;
    border-radius: 50%;
    animation: spin .7s linear infinite;
    margin: 0 auto;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Results ────────────────────────────────────────────────────────────── */
  #results { margin-top: 36px; animation: fadeUp .4s ease; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Risk meter */
  .risk-banner {
    border-radius: 14px;
    padding: 28px 32px;
    margin-bottom: 24px;
    border: 1px solid;
    display: flex; align-items: center; gap: 24px;
    flex-wrap: wrap;
  }
  .risk-icon { font-size: 2.8rem; line-height: 1; }
  .risk-info { flex: 1; min-width: 200px; }
  .risk-label {
    font-size: 1.6rem; font-weight: 800; letter-spacing: .06em;
  }
  .risk-subtext { font-family: var(--mono); font-size: .78rem; color: inherit; opacity: .7; margin-top: 4px; }

  .risk-gauge {
    width: 140px; flex-shrink: 0;
  }
  .gauge-track {
    height: 8px; background: rgba(255,255,255,.1);
    border-radius: 4px; overflow: hidden;
  }
  .gauge-fill {
    height: 100%; border-radius: 4px;
    transition: width 1s cubic-bezier(.22,1,.36,1);
  }
  .gauge-val {
    font-family: var(--mono); font-size: 1.8rem; font-weight: 700;
    text-align: right; margin-top: 4px;
  }

  /* Section cards */
  .result-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 16px;
  }

  .result-card {
    background: rgba(255,255,255,.02);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
  }
  .result-card h3 {
    font-size: .72rem; font-weight: 700; letter-spacing: .12em;
    text-transform: uppercase; color: var(--muted); margin-bottom: 14px;
    display: flex; align-items: center; gap: 8px;
  }
  .result-card h3 .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent);
  }

  /* Score bar */
  .score-row {
    display: flex; align-items: center; gap: 12px; margin-bottom: 10px;
  }
  .score-label { font-family: var(--mono); font-size: .75rem; color: var(--muted); width: 110px; flex-shrink: 0; }
  .score-bar-wrap { flex: 1; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .score-bar { height: 100%; border-radius: 3px; transition: width 1s cubic-bezier(.22,1,.36,1); }
  .score-val { font-family: var(--mono); font-size: .75rem; width: 42px; text-align: right; flex-shrink: 0; }

  /* Signal tags */
  .signals { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 10px; }
  .signal-tag {
    font-family: var(--mono); font-size: .68rem;
    padding: 4px 10px; border-radius: 20px;
    border: 1px solid;
  }
  .signal-tag.warn  { border-color: #ff7a00; color: #ff7a00; background: rgba(255,122,0,.08); }
  .signal-tag.safe  { border-color: var(--safe); color: var(--safe); background: rgba(0,200,83,.08); }
  .signal-tag.info  { border-color: var(--accent); color: var(--accent); background: rgba(0,229,255,.06); }

  /* URL table */
  .url-table { width: 100%; border-collapse: collapse; margin-top: 6px; }
  .url-table th {
    font-size: .67rem; text-transform: uppercase; letter-spacing: .1em;
    color: var(--muted); text-align: left; padding: 0 8px 8px;
    border-bottom: 1px solid var(--border);
  }
  .url-table td {
    font-family: var(--mono); font-size: .72rem; padding: 8px;
    border-bottom: 1px solid rgba(30,42,66,.5);
    word-break: break-all;
  }
  .url-table tr:last-child td { border-bottom: none; }

  .badge {
    display: inline-block; padding: 3px 9px;
    border-radius: 4px; font-size: .67rem; font-weight: 700;
    letter-spacing: .05em;
  }

  /* Components breakdown */
  .comp-list { margin-top: 4px; }
  .comp-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 0; border-bottom: 1px solid rgba(30,42,66,.6);
    font-family: var(--mono); font-size: .78rem;
  }
  .comp-row:last-child { border-bottom: none; }

  /* Error */
  .error-box {
    background: rgba(255,45,45,.07);
    border: 1px solid #ff2d2d;
    border-radius: 10px; padding: 16px 20px;
    font-family: var(--mono); font-size: .82rem; color: #ff2d2d;
  }

  /* Responsive */
  @media (max-width: 600px) {
    header { padding: 16px 20px; }
    .container { padding: 28px 16px 60px; }
    .panel { padding: 20px; }
    .risk-banner { padding: 20px; }
    .tabs { width: 100%; }
    .tab-btn { flex: 1; text-align: center; padding: 10px 12px; }
  }
</style>
</head>
<body>

<!-- Header -->
<header>
  <div class="logo">
    <div class="logo-icon"></div>
    <div class="logo-text">Phish<span>Shield</span></div>
  </div>
  <div class="status-pill">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">checking api…</span>
  </div>
</header>

<!-- Main -->
<div class="container">

  <div class="hero">
    <h1>Threat Detection System</h1>
    <p>Submit a suspicious URL or a full email (subject, body, attachments) and our AI risk engine will analyse every component separately.</p>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('url',this)">🔗 Scan URL</button>
    <button class="tab-btn"        onclick="switchTab('email',this)">📧 Scan Email</button>
  </div>

  <!-- ── URL tab ─────────────────────────────────────────────────────────── -->
  <div id="tab-url" class="tab-panel active">
    <div class="panel">
      <div class="form-row">
        <label>Suspicious URL</label>
        <input type="url" id="urlInput" placeholder="https://suspicious-site.tk/login/verify?account=…" />
      </div>
      <button class="btn-scan" id="urlBtn" onclick="scanUrl()">
        <span class="btn-label">Analyse URL</span>
        <div class="spinner" id="urlSpinner"></div>
      </button>
    </div>
  </div>

  <!-- ── Email tab ───────────────────────────────────────────────────────── -->
  <div id="tab-email" class="tab-panel">
    <div class="panel">
      <div class="form-row">
        <label>Subject</label>
        <input type="text" id="emailSubject" placeholder="URGENT: Your account has been suspended" />
      </div>
      <div class="form-row">
        <label>Email Body</label>
        <textarea id="emailBody" rows="7"
          placeholder="Dear customer, your bank account has been temporarily locked due to suspicious activity.
Verify your identity immediately at http://secure-verify.tk/confirm?id=abc123
Failure to act within 24 hours will result in permanent suspension."></textarea>
      </div>
      <div class="form-row">
        <label>Attachments (optional)</label>
        <div class="file-drop" onclick="document.getElementById('attachInput').click()">
          <input type="file" id="attachInput" multiple
                 accept=".txt,.eml,.msg,.pdf,.html,.htm"
                 onchange="handleFiles(this.files)" />
          <div>📎 Click to attach files &nbsp;·&nbsp; <span style="opacity:.5">.txt .eml .msg .pdf .html</span></div>
          <div class="file-list" id="fileList"></div>
        </div>
      </div>
      <button class="btn-scan" id="emailBtn" onclick="scanEmail()">
        <span class="btn-label">Analyse Email</span>
        <div class="spinner" id="emailSpinner"></div>
      </button>
    </div>
  </div>

  <!-- Results -->
  <div id="results" style="display:none;"></div>

</div><!-- /container -->

<script>
// ── Config ────────────────────────────────────────────────────────────────────
const API = 'http://localhost:5000';
let attachedFiles = [];

// ── Health check ──────────────────────────────────────────────────────────────
async function checkHealth() {
  try {
    const r = await fetch(`${API}/health`, { signal: AbortSignal.timeout(4000) });
    const d = await r.json();
    document.getElementById('statusDot').classList.add('online');
    document.getElementById('statusText').textContent =
      `API online · BERT ${d.bert_model ? 'ready' : 'off'}`;
  } catch {
    document.getElementById('statusText').textContent = 'API offline';
  }
}
checkHealth();

// ── Tab switch ────────────────────────────────────────────────────────────────
function switchTab(name, el) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  el.classList.add('active');
  document.getElementById('results').style.display = 'none';
}

// ── File handling ──────────────────────────────────────────────────────────────
function handleFiles(files) {
  for (const f of files) attachedFiles.push(f);
  renderFileList();
}
function removeFile(i) {
  attachedFiles.splice(i, 1);
  renderFileList();
}
function renderFileList() {
  const el = document.getElementById('fileList');
  el.innerHTML = attachedFiles.map((f, i) =>
    `<div class="file-chip">📄 ${f.name}
       <button onclick="removeFile(${i})">×</button>
     </div>`
  ).join('');
}

// ── Loading state ─────────────────────────────────────────────────────────────
function setLoading(type, on) {
  const btn  = document.getElementById(type + 'Btn');
  const lbl  = btn.querySelector('.btn-label');
  const spin = document.getElementById(type + 'Spinner');
  btn.disabled   = on;
  lbl.style.display  = on ? 'none' : '';
  spin.style.display = on ? 'block' : 'none';
}

// ── Scan URL ──────────────────────────────────────────────────────────────────
async function scanUrl() {
  const url = document.getElementById('urlInput').value.trim();
  if (!url) return flash('urlInput', 'Please enter a URL');
  setLoading('url', true);
  try {
    const res  = await fetch(`${API}/predict/url`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    renderUrlResult(data);
  } catch (e) {
    renderError(e.message);
  } finally {
    setLoading('url', false);
  }
}

// ── Scan Email ────────────────────────────────────────────────────────────────
async function scanEmail() {
  const subject = document.getElementById('emailSubject').value.trim();
  const body    = document.getElementById('emailBody').value.trim();
  if (!subject && !body) return flash('emailBody', 'Please enter email content');
  setLoading('email', true);
  try {
    const fd = new FormData();
    fd.append('subject', subject);
    fd.append('body',    body);
    for (const f of attachedFiles) fd.append('attachments[]', f);
    const res  = await fetch(`${API}/predict/email`, { method: 'POST', body: fd });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    renderEmailResult(data);
  } catch (e) {
    renderError(e.message);
  } finally {
    setLoading('email', false);
  }
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function flash(id, msg) {
  const el = document.getElementById(id);
  el.style.borderColor = 'var(--critical)';
  el.placeholder = msg;
  setTimeout(() => { el.style.borderColor = ''; }, 2000);
}

function riskColor(tier) {
  const map = { SAFE:'#00c853', LOW:'#4caf50', MEDIUM:'#ffd600', HIGH:'#ff7a00', CRITICAL:'#ff2d2d' };
  return map[tier] || '#aaa';
}
function riskIcon(tier) {
  const map = { SAFE:'✅', LOW:'🟢', MEDIUM:'⚠️', HIGH:'🔴', CRITICAL:'☠️' };
  return map[tier] || '❓';
}
function badgeHtml(pred) {
  const isPhish = pred === 'phishing';
  const bg = isPhish ? 'rgba(255,45,45,.15)' : 'rgba(0,200,83,.12)';
  const cl = isPhish ? '#ff2d2d' : '#00c853';
  return `<span class="badge" style="background:${bg};color:${cl}">${isPhish ? 'PHISHING' : 'SAFE'}</span>`;
}

function scoreBarColor(prob) {
  if (prob >= .8) return 'var(--critical)';
  if (prob >= .6) return 'var(--high)';
  if (prob >= .4) return 'var(--medium)';
  return 'var(--safe)';
}

function signalsHtml(signals, type = 'warn') {
  if (!signals || !signals.length)
    return `<span class="signal-tag safe">No suspicious signals</span>`;
  return signals.map(s => `<span class="signal-tag ${type}">${s}</span>`).join('');
}

function scoreRowHtml(label, prob) {
  if (prob === null || prob === undefined) return '';
  const pct   = (prob * 100).toFixed(1);
  const color = scoreBarColor(prob);
  return `
    <div class="score-row">
      <span class="score-label">${label}</span>
      <div class="score-bar-wrap">
        <div class="score-bar" style="width:${pct}%;background:${color}"></div>
      </div>
      <span class="score-val" style="color:${color}">${pct}%</span>
    </div>`;
}

// ── Render URL Result ─────────────────────────────────────────────────────────
function renderUrlResult(d) {
  const tier  = d.risk_tier;
  const color = d.risk_color || riskColor(tier);
  const prob  = d.phishing_prob;
  const pct   = (prob * 100).toFixed(1);

  const html = `
  <div class="risk-banner" style="background:${color}18;border-color:${color}55;color:${color}">
    <div class="risk-icon">${riskIcon(tier)}</div>
    <div class="risk-info">
      <div class="risk-label">${tier}</div>
      <div class="risk-subtext">Phishing probability · ${pct}%</div>
    </div>
    <div class="risk-gauge">
      <div class="gauge-val" style="color:${color}">${pct}%</div>
      <div class="gauge-track"><div class="gauge-fill" style="width:${pct}%;background:${color}"></div></div>
    </div>
  </div>

  <div class="result-grid">
    <div class="result-card">
      <h3><div class="dot"></div>Model Scores</h3>
      ${scoreRowHtml('XGBoost', d.xgb_prob)}
      ${scoreRowHtml('Logistic Reg.', d.lr_prob)}
      ${scoreRowHtml('Ensemble', d.phishing_prob)}
    </div>
    <div class="result-card">
      <h3><div class="dot"></div>Detection Signals</h3>
      <div class="signals">${signalsHtml(d.signals)}</div>
    </div>
  </div>

  <div class="result-card" style="margin-top:16px">
    <h3><div class="dot"></div>Scanned URL</h3>
    <div style="font-family:var(--mono);font-size:.8rem;word-break:break-all;color:var(--text);margin-top:4px">
      ${d.url} &nbsp; ${badgeHtml(d.prediction)}
    </div>
  </div>`;

  show(html);
}

// ── Render Email Result ───────────────────────────────────────────────────────
function renderEmailResult(d) {
  const risk  = d.risk;
  const tier  = risk.risk_tier;
  const color = risk.risk_color || riskColor(tier);
  const prob  = risk.risk_score;
  const pct   = (prob * 100).toFixed(1);
  const lr    = d.text_lr   || {};
  const bert  = d.text_bert || {};
  const urls  = d.url_results || [];
  const atts  = d.attachment_results || [];

  // URL table rows
  const urlRows = urls.length
    ? urls.map(u => `
        <tr>
          <td style="max-width:300px">${u.url}</td>
          <td style="color:${scoreBarColor(u.phishing_prob)};text-align:center">${(u.phishing_prob*100).toFixed(1)}%</td>
          <td style="text-align:center">${badgeHtml(u.prediction)}</td>
        </tr>`).join('')
    : `<tr><td colspan="3" style="color:var(--muted);text-align:center;padding:14px">No URLs detected in this email</td></tr>`;

  // Attachment rows
  const attSection = atts.length ? `
    <div class="result-card">
      <h3><div class="dot"></div>Attachments (${atts.length})</h3>
      ${atts.map(a => `
        <div class="comp-row">
          <span>📎 ${a.filename}</span>
          <span>${badgeHtml(a.prediction)} &nbsp;
            <span style="font-family:var(--mono);font-size:.72rem;color:${scoreBarColor(a.phishing_prob)}">
              ${(a.phishing_prob*100).toFixed(1)}%
            </span>
          </span>
        </div>`).join('')}
    </div>` : '';

  const html = `
  <!-- Risk banner -->
  <div class="risk-banner" style="background:${color}18;border-color:${color}55;color:${color}">
    <div class="risk-icon">${riskIcon(tier)}</div>
    <div class="risk-info">
      <div class="risk-label">${tier} RISK</div>
      <div class="risk-subtext">Composite risk score · ${pct}%</div>
    </div>
    <div class="risk-gauge">
      <div class="gauge-val" style="color:${color}">${pct}%</div>
      <div class="gauge-track"><div class="gauge-fill" style="width:${pct}%;background:${color}"></div></div>
    </div>
  </div>

  <!-- Component breakdown + Text analysis -->
  <div class="result-grid">

    <div class="result-card">
      <h3><div class="dot"></div>Risk Components</h3>
      <div class="comp-list">
        ${scoreRowHtml('URL (worst)', risk.components.url)}
        ${scoreRowHtml('Text · LR', risk.components.text_lr)}
        ${risk.components.text_bert !== null ? scoreRowHtml('Text · BERT', risk.components.text_bert) : ''}
        ${scoreRowHtml('Attachments', risk.components.attachment)}
        <div style="border-top:1px solid var(--border);margin-top:10px;padding-top:10px">
          ${scoreRowHtml('FINAL SCORE', risk.risk_score)}
        </div>
      </div>
    </div>

    <div class="result-card">
      <h3><div class="dot"></div>Text Analysis</h3>
      ${scoreRowHtml('TF-IDF + LR', lr.phishing_prob)}
      ${bert.phishing_prob != null ? scoreRowHtml('DistilBERT', bert.phishing_prob) : '<div style="font-family:var(--mono);font-size:.72rem;color:var(--muted)">DistilBERT not loaded</div>'}
      <div class="signals" style="margin-top:12px">${signalsHtml(lr.signals || [])}</div>
    </div>

  </div>

  <!-- All signals -->
  ${risk.all_signals && risk.all_signals.length ? `
  <div class="result-card" style="margin-top:16px">
    <h3><div class="dot"></div>All Detection Signals</h3>
    <div class="signals">${signalsHtml(risk.all_signals)}</div>
  </div>` : ''}

  <!-- URL table -->
  <div class="result-card" style="margin-top:16px">
    <h3><div class="dot"></div>URLs Found (${urls.length})</h3>
    <table class="url-table">
      <thead><tr><th>URL</th><th>P(phish)</th><th>Verdict</th></tr></thead>
      <tbody>${urlRows}</tbody>
    </table>
  </div>

  <!-- Attachments -->
  ${attSection}`;

  show(html);
}

// ── Render Error ──────────────────────────────────────────────────────────────
function renderError(msg) {
  show(`<div class="error-box">⚠ Error: ${msg}<br><span style="opacity:.6">Make sure the Flask API is running on ${API}</span></div>`);
}

function show(html) {
  const el = document.getElementById('results');
  el.innerHTML = html;
  el.style.display = 'block';
  el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}
</script>
</body>
</html>
